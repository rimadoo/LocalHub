{% extends 'marketplace/base.html' %}
{% block content %}
<div class="container my-5 py-4">
    <!-- --- CARD HEADER INFRASTRUCTURE --- -->
    <div class="d-flex justify-content-between align-items-end mb-4 pb-2 border-bottom border-light-subtle reveal-up">
        <div>
            <span class="text-uppercase text-primary fw-bold small tracking-wider" style="letter-spacing: 1px;">Artisan Channel</span>
            <h2 class="fw-extrabold text-dark mb-0 mt-1">Your Creative Basket</h2>
        </div>
        <span class="badge rounded-pill bg-dark text-info px-3 py-2 fw-bold" id="cart-item-count" style="font-size: 0.8rem;">0 Items</span>
    </div>

    <div class="row g-4">
        <!-- --- LEFT SIDE: RUNNING BASKET STREAM --- -->
        <div class="col-lg-8 col-md-7 reveal-left">
            <div id="cart-items-list">
                <!-- JavaScript appends rows seamlessly here -->
            </div>
        </div>

        <!-- --- RIGHT SIDE: FINANCIAL SUMMARY VAULT --- -->
        <div class="col-lg-4 col-md-5 reveal-right">
            <div class="card border-0 shadow-sm p-4 rounded-4 bg-white sticky-md-top" style="top: 100px; z-index: 3;">
                <h5 class="fw-extrabold text-dark mb-4">Settlement Invoice</h5>
                
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="text-secondary small fw-semibold">Subtotal Gross</span>
                    <span class="fw-bold text-dark" id="subtotal-amount">৳0.00</span>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <span class="text-secondary small fw-semibold">Logistics Handling</span>
                    <span class="badge bg-primary-subtle text-primary text-uppercase fw-bold" style="font-size: 0.65rem; letter-spacing: 0.5px;">Calculated Next</span>
                </div>
                
                <hr class="border-light-subtle my-3">
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <span class="fw-extrabold text-dark fs-5">Total Valuation</span>
                    <span class="fw-extrabold fs-4 text-success" id="total-amount">৳0.00</span>
                </div>
                
                <div class="d-flex flex-column gap-2">
                    <a href="{% url 'checkout' %}" class="btn btn-info w-100 rounded-pill fw-bold py-3 text-white shadow-sm transition-all hover-lift">
                        <i class="bi bi-shield-lock-fill me-2"></i>Proceed to Checkout
                    </a>
                    <a href="{% url 'creative_shop' %}" class="btn btn-outline-secondary w-100 rounded-pill py-2.5 small custom-btn-back">
                        <i class="bi bi-arrow-left me-2"></i>Return to Gallery Shop
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- --- BASKET STREAM DECORATOR PROPERTIES --- -->
<style>
    /* Interactive Catalog Row Wrappers */
    .custom-cart-card {
        border: 1px solid #eef0f2 !important;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        background: #ffffff;
    }
    .custom-cart-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 25px rgba(0,0,0,0.05) !important;
        border-color: rgba(0, 210, 211, 0.25) !important;
    }

    .custom-btn-back {
        font-weight: 600;
        font-size: 0.85rem;
        transition: all 0.3s ease;
    }
    .custom-btn-back:hover {
        background-color: #fafbfc;
        color: #2c3e50 !important;
    }

    /* System Layout Tweaks */
    .transition-all { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .hover-lift:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 210, 211, 0.25) !important; }
    .fw-extrabold { font-weight: 800; }
    .tracking-wider { letter-spacing: 0.5px; }
</style>

<script>
    function displayCart() {
        let cart = JSON.parse(localStorage.getItem('creative_cart')) || [];
        let listContainer = document.getElementById('cart-items-list');
        let subtotalDisplay = document.getElementById('subtotal-amount');
        let totalDisplay = document.getElementById('total-amount');
        let countBadge = document.getElementById('cart-item-count');
        
        let total = 0;

        // Clean Empty State Frame Trigger
        if (cart.length === 0) {
            listContainer.innerHTML = `
                <div class="text-center py-5 bg-white rounded-4 shadow-sm border border-light-subtle animate__animated animate__fadeIn">
                    <div class="d-inline-flex p-4 rounded-circle bg-light text-muted mb-3 fs-1">
                        <i class="bi bi-cart-x"></i>
                    </div>
                    <h5 class="fw-bold text-dark">Your Basket is Empty</h5>
                    <p class="text-muted small mb-4 mx-auto" style="max-width: 280px;">You haven't initialized or claimed any artisan craft goods yet.</p>
                    <a href="{% url 'creative_shop' %}" class="btn btn-info text-white rounded-pill px-4 py-2 fw-bold shadow-sm transition-all hover-lift">
                        Explore Creative Gallery
                    </a>
                </div>`;
            subtotalDisplay.innerText = "৳0.00";
            totalDisplay.innerText = "৳0.00";
            countBadge.innerText = "0 Items";
            return;
        }

        countBadge.innerText = cart.length + (cart.length === 1 ? " Item" : " Items");

        // Dynamic Mapping Frame with Cascade Stagger Timing Array hooks
        listContainer.innerHTML = cart.map((item, index) => {
            let price = parseFloat(item.price) || 0;
            total += price;
            return `
                <div class="card border-0 shadow-sm rounded-4 p-3 mb-3 custom-cart-card animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.05}s">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                        <div class="d-flex align-items-center">
                            <div class="p-3 rounded-3 me-3 text-warning border d-flex align-items-center justify-content-center" style="background: rgba(255, 193, 7, 0.06); border-color: rgba(255, 193, 7, 0.15) !important; width: 55px; height: 55px;">
                                <i class="bi bi-palette2 fs-4"></i>
                            </div>
                            <div>
                                <h6 class="fw-bold text-dark mb-1">${item.title}</h6>
                                <span class="badge bg-light text-secondary border small" style="font-size: 0.65rem;">Verified Local Artisan Asset</span>
                            </div>
                        </div>
                        <div class="text-md-end ms-auto ms-md-0 d-flex flex-md-column align-items-center align-items-md-end justify-content-between w-100 w-md-auto">
                            <div class="fw-extrabold text-dark fs-5 mb-md-1">৳${price.toFixed(2)}</div>
                            <button onclick="removeItem(${index})" class="btn btn-link text-danger text-decoration-none p-0 border-0 bg-transparent small fw-semibold" style="font-size: 0.8rem;">
                                <i class="bi bi-trash3 me-1"></i> Purge Item
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        subtotalDisplay.innerText = "৳" + total.toFixed(2);
        totalDisplay.innerText = "৳" + total.toFixed(2);
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('creative_cart')) || [];
        cart.splice(index, 1);
        localStorage.setItem('creative_cart', JSON.stringify(cart));
        
        displayCart();
        // Dispatches global updates to navigation count selectors in base header
        if (typeof updateCartUI === "function") updateCartUI();
    }

    document.addEventListener('DOMContentLoaded', displayCart);
</script>
{% endblock %}
